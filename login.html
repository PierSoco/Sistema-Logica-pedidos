<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Logística y Pedidos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
        }
        .login-container h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Para que el padding no desborde el ancho */
        }
        .form-group input:focus {
            border-color: #007bff;
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .login-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Iniciar Sesión</h2>
        <form id="formLogin">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="login-btn">Entrar</button>
        </form>
    </div>

    <script>
        // Escuchamos el evento 'submit' del formulario completo
        document.getElementById('formLogin').addEventListener('submit', async function(event) {
            event.preventDefault(); // Detiene la recarga de la página inmediatamente

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                // Asegúrate de que la ruta './backend/login.php' sea correcta según tu carpeta
                const response = await fetch('./backend/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                // Si el servidor devuelve un error de código (ej. 500), esto nos avisará
                if (!response.ok) {
                    throw new Error("Error en la respuesta del servidor");
                }

                const result = await response.json();

                if (result.success) {
                    alert("¡Bienvenido, " + result.nombre + "!");
                    // CAMBIO: Redirección al index.html
                    window.location.href = 'index.html'; 
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                console.error("Error detallado:", error);
                alert("No se pudo conectar con el servidor. Revisa la consola (F12) para más detalles.");
            }
        });
    </script>
</body>
</html>
