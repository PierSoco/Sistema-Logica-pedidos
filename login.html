<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Logística y Pedidos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
        }
        .login-container h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Para que el padding no desborde el ancho */
        }
        .form-group input:focus {
            border-color: #007bff;
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .login-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Iniciar Sesión</h2>
        <!-- El 'action' apuntará al archivo backend que procesará el login (ej. procesar_login.php) -->
        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="login-btn" onclick="ingresarlogin(event)">Entrar</button>
        </form>
    </div>

    <script>
        async function ingresarlogin(event) {
            // Prevenir que el formulario recargue la página al hacer click
            event.preventDefault();

            // Capturar los valores de los inputs
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                // Enviar petición POST al backend enviando los datos en formato JSON
                const response = await fetch('./backend/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    alert("¡Bienvenido, " + result.nombre + "! Has ingresado como " + result.rol + ".");
                    // Redirigimos a la pantalla principal de tu app
                    window.location.href = 'prueba.html';
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                console.error("Error de conexión:", error);
                alert("Hubo un problema al conectar con el servidor.");
            }
        }
    </script>
</body>
</html>
