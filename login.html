<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <title>Login — RepartoGO</title>
</head>
<body class="login-body">

<div class="bg-decorative">
        <i class="fa-solid fa-truck-fast truck-1"></i>
        <i class="fa-solid fa-bag-shopping delivery-bag"></i>
    </div>

    <div class="login-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-wrapper">

        <div class="login-brand">
            <div class="login-logo">🚚</div>
            <h1>Reparto<em>GO</em></h1>
            <p>Sistema de logística y gestión de pedidos</p>
        </div>

        <div class="login-card">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ingresá tu usuario" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Ingresá tu contraseña" autocomplete="current-password">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword()"></i>
                </div>
            </div>

            <button class="login-btn" onclick="loginUsuario()">
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                Ingresar al sistema
            </button>
        </div>

        <div class="login-footer">
            <a href="olvide.html">¿Olvidaste tu contraseña?</a>
        </div>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
