<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interfaz de gestión de pedidos para repartidores.">
    <title>🚚 Módulo Repartidor - Sistema Logística</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Estilos específicos para el login integrados */
        .login-wrapper {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
        }
        .login-container h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #007bff;
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .login-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <!-- SECCIÓN DE LOGIN -->
    <div id="login-section" class="login-wrapper">
        <div class="login-container">
            <h2>Iniciar Sesión</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="login-btn">Entrar</button>
            </form>
        </div>
    </div>

    <!-- SECCIÓN DE LA APP (Oculta por defecto para mostrar primero el login) -->
    <div class="app-container" id="app-section" style="display: none;">
        <header class="app-header">
            <h1>Pedidos Listos</h1>
            <button id="btn-refresh" class="btn-primary" aria-label="Actualizar lista de pedidos">↻ Actualizar Pedidos</button>
        </header>
    
        <main id="contenedor-pedidos" class="pedidos-list">
            <p class="loading-text" style="text-align: center; color: #666;">Cargando pedidos disponibles...</p>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
