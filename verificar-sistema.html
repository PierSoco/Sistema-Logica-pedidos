<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación del Sistema</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a1a1a;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section {
            margin: 24px 0;
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .section h2 {
            color: #374151;
            font-size: 18px;
            margin-bottom: 12px;
        }
        .check-item {
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        .status.ok {
            background: #10b981;
        }
        .status.error {
            background: #ef4444;
        }
        .status.warning {
            background: #f59e0b;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 8px 8px 0;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }
        .info {
            background: #e0e7ff;
            padding: 12px;
            border-radius: 6px;
            margin: 8px 0;
            font-family: monospace;
            font-size: 14px;
        }
        .actions {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            🔍 Verificación del Sistema
        </h1>

        <div class="section">
            <h2>1. Estado de LocalStorage</h2>
            <div id="localStorage-status"></div>
        </div>

        <div class="section">
            <h2>2. Elementos del DOM</h2>
            <div id="dom-status"></div>
        </div>

        <div class="section">
            <h2>3. Paneles Disponibles</h2>
            <div id="panels-status"></div>
        </div>

        <div class="section">
            <h2>4. Scripts Cargados</h2>
            <div id="scripts-status"></div>
        </div>

        <div class="actions">
            <button onclick="simularLogin('superadmin')">
                🔑 Simular Login SuperAdmin
            </button>
            <button onclick="simularLogin('repartidor')">
                🚚 Simular Login Repartidor
            </button>
            <button onclick="limpiarTodo()">
                🗑️ Limpiar LocalStorage
            </button>
            <button onclick="irADashboard()">
                📊 Ir a Dashboard
            </button>
        </div>
    </div>

    <script>
        function verificarSistema() {
            // 1. Verificar LocalStorage
            const localStorageDiv = document.getElementById('localStorage-status');
            const nombre = localStorage.getItem('user_nombre');
            const rol = localStorage.getItem('user_rol');
            
            if (nombre && rol) {
                localStorageDiv.innerHTML = `
                    <div class="check-item">
                        <div class="status ok">✓</div>
                        <span>Sesión activa</span>
                    </div>
                    <div class="info">
                        <strong>Nombre:</strong> ${nombre}<br>
                        <strong>Rol:</strong> ${rol}
                    </div>
                `;
            } else {
                localStorageDiv.innerHTML = `
                    <div class="check-item">
                        <div class="status warning">!</div>
                        <span>No hay sesión activa (esto es normal si no has iniciado sesión)</span>
                    </div>
                `;
            }

            // 2. Verificar elementos del DOM
            const domDiv = document.getElementById('dom-status');
            const elementos = [
                'header-nombre',
                'header-rol',
                'avatar-inicial',
                'btn-cerrar-sesion',
                'panel-superadmin',
                'panel-repartidor',
                'panel-admin',
                'panel-chef',
                'panel-recepcionista'
            ];

            let domHtml = '';
            elementos.forEach(id => {
                const existe = document.getElementById(id) !== null;
                domHtml += `
                    <div class="check-item">
                        <div class="status ${existe ? 'ok' : 'error'}">${existe ? '✓' : '✗'}</div>
                        <span>${id} ${existe ? '(encontrado)' : '(NO encontrado)'}</span>
                    </div>
                `;
            });
            domDiv.innerHTML = domHtml;

            // 3. Verificar paneles
            const panelsDiv = document.getElementById('panels-status');
            const roles = ['superadmin', 'admin', 'recepcionista', 'chef', 'repartidor'];
            
            let panelsHtml = '';
            roles.forEach(rol => {
                const panel = document.getElementById(`panel-${rol}`);
                const existe = panel !== null;
                const visible = panel ? !panel.classList.contains('hidden') : false;
                
                panelsHtml += `
                    <div class="check-item">
                        <div class="status ${existe ? 'ok' : 'error'}">${existe ? '✓' : '✗'}</div>
                        <span>panel-${rol} ${existe ? (visible ? '(VISIBLE)' : '(oculto)') : '(NO existe)'}</span>
                    </div>
                `;
            });
            panelsDiv.innerHTML = panelsHtml;

            // 4. Verificar scripts
            const scriptsDiv = document.getElementById('scripts-status');
            const scripts = Array.from(document.scripts).map(s => s.src || '(inline)');
            
            scriptsDiv.innerHTML = `
                <div class="info">
                    Scripts cargados: ${scripts.length}<br>
                    ${scripts.map(s => `• ${s}`).join('<br>')}
                </div>
            `;
        }

        function simularLogin(rol) {
            localStorage.setItem('user_nombre', 'Usuario de Prueba');
            localStorage.setItem('user_rol', rol);
            alert(`✅ Sesión simulada creada\n\nRol: ${rol}\n\nAhora ve a dashboard.html`);
            verificarSistema();
        }

        function limpiarTodo() {
            localStorage.clear();
            alert('✅ LocalStorage limpiado');
            verificarSistema();
        }

        function irADashboard() {
            window.location.href = 'dashboard.html';
        }

        // Verificar automáticamente al cargar
        verificarSistema();

        // Actualizar cada 2 segundos
        setInterval(verificarSistema, 2000);
    </script>
</body>
</html>
