<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <!-- FAVICON CORREGIDO (ruta relativa) -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <link rel="shortcut icon" href="assets/img/favicon.png">
    <title>Recuperar — RepartoGO</title>
</head>
<body class="login-body">

    <div class="bg-decorative">
        <i class="fa-solid fa-envelope-open-text truck-1"></i>
        <i class="fa-solid fa-shield-halved delivery-bag"></i>
    </div>

    <div class="login-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-brand">
            <div class="login-logo">
                <img src="assets/img/logo.png" alt="RepartoGO Logo">
            </div>
            <h1>Reparto<em>GO</em></h1>
            <p>Sistema de logística y gestión de pedidos</p>
        </div>

        <div class="login-card">
            <h2 style="text-align: center; margin-bottom: 20px; font-size: 1.2rem;">Recuperar Contraseña</h2>
            
            <div class="form-group">
                <label for="email-recuperacion">Correo electrónico</label>
                <input type="email" id="email-recuperacion" placeholder="Ingresá tu correo" autocomplete="email">
            </div>

            <button class="login-btn" id="btn-enviar" onclick="solicitarRecuperacion()">
                <i class="fa-solid fa-envelope"></i>
                Enviar Enlace
            </button>
            
            <div class="resend-section">
                <button class="btn-resend" id="btn-reenviar" onclick="reenviarCorreo()">
                    <i class="fa-solid fa-paper-plane"></i>
                    Reenviar correo
                </button>
                <div id="resend-status" class="status-message"></div>
                <div id="countdown-timer" style="font-size: 0.75rem; color: var(--text-3); margin-top: 8px;"></div>
            </div>
        </div>

        <div class="login-footer">
            <a href="login.html"><i class="fa-solid fa-arrow-left"></i> Volver al login</a>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
