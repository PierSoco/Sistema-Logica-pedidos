<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <h2>Crear Nueva Contraseña</h2>
        <div class="form-group">
            <label for="new-password">Nueva contraseña</label>
            <input type="password" id="new-password" placeholder="Mínimo 8 caracteres">
        </div>
        <div class="form-group">
            <label for="confirm-password">Confirmar contraseña</label>
            <input type="password" id="confirm-password" placeholder="Repite la contraseña">
        </div>
        <button class="login-btn" onclick="guardarNuevaPassword()">Actualizar Contraseña</button>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
