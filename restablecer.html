<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <title>Nueva Contraseña — RepartoGO</title>
</head>
<body class="login-body">

    <div class="bg-decorative">
        <i class="fa-solid fa-truck-fast truck-1"></i>
        <i class="fa-solid fa-bag-shopping delivery-bag"></i>
    </div>

    <div class="login-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-brand">
            <div class="login-logo">🚚</div>
            <h1>Reparto<em>GO</em></h1>
            <p>Sistema de logística y gestión de pedidos</p>
        </div>

        <div class="login-card">
            <h2 style="text-align: center; margin-bottom: 20px; font-size: 1.2rem;">Crear Nueva Contraseña</h2>
            
            <div class="form-group">
                <label for="new-password">Nueva contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="new-password" placeholder="Mínimo 8 caracteres">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('new-password')"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirmar contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" placeholder="Repite la contraseña">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('confirm-password')"></i>
                </div>
            </div>

            <button class="login-btn" onclick="guardarNuevaPassword()">
                <i class="fa-solid fa-floppy-disk"></i>
                Actualizar Contraseña
            </button>
        </div>

        <div class="login-footer">
            <a href="login.html"><i class="fa-solid fa-arrow-left"></i> Volver al login</a>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
